<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM EVOLUTION | JOB CHANGE</title>
    <style>
        :root { --accent: #00ffff; --bg: #050505; }
        body {
            background: var(--bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            border: 1px solid var(--accent);
            padding: 30px;
            background: rgba(0, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            max-width: 500px;
            text-align: center;
        }
        h1 { letter-spacing: 5px; color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        .job-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .job-card {
            border: 1px solid #333;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .job-card:hover {
            background: var(--accent);
            color: black;
            box-shadow: 0 0 15px var(--accent);
        }
        .desc { font-size: 0.8rem; margin-top: 5px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="container">
        <h1>EVOLUTION</h1>
        <p>You have surpassed the limits of a human Hunter.</p>
        <p>Select your specialized Class:</p>

        <div class="job-list">
            <div class="job-card" onclick="finalizeJob('Fighter')">
                <strong>FIGHTER</strong>
                <div class="desc">Focus: STR & VIT</div>
            </div>
            <div class="job-card" onclick="finalizeJob('Mage')">
                <strong>MAGE</strong>
                <div class="desc">Focus: INT & FOC</div>
            </div>
            <div class="job-card" onclick="finalizeJob('Assassin')">
                <strong>ASSASSIN</strong>
                <div class="desc">Focus: AGI & STR</div>
            </div>
            <div class="job-card" onclick="finalizeJob('Healer')">
                <strong>HEALER</strong>
                <div class="desc">Focus: VIT & INT</div>
            </div>
        </div>
    </div>

    <script>
        // 1. Fetch data from wherever you store it (Firebase or LocalStorage)
        // This assumes you are using LocalStorage for persistence
        let p = JSON.parse(localStorage.getItem('hunterData')) || {};

        function finalizeJob(choice) {
    // 1. Get the freshest data right before saving
    let p = JSON.parse(localStorage.getItem('hunterData')) || {};

    // 2. Update the job and stats
    p.job = choice; // This changes "Unawakened" to "Fighter", "Mage", etc.
    
    if (choice === 'Fighter') p.stats.STR += 20;
    if (choice === 'Mage') p.stats.INT += 20;
    if (choice === 'Assassin') p.stats.AGI += 20;
    if (choice === 'Healer') p.stats.VIT += 20;

    // 3. Save back to storage
    localStorage.setItem('hunterData', JSON.stringify(p));
    
    // 4. Firebase Sync (Optional but recommended if you use it)
    // db.collection('hunters').doc(auth.currentUser.uid).update({ job: choice, stats: p.stats });

    alert("CLASS SELECTED: " + choice.toUpperCase());
    
    // 5. REDIRECT BACK
    window.location.href = "index.html"; 
}
    </script>
</body>
</html>
