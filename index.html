<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#030508">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>THE SYSTEM | AWAKENING</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/neon/96/00d4ff/shield.png">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #030508;
            --accent: #00d4ff;
            --danger: #ff3e3e;
            --success: #00ff95;
            --border: rgba(255,255,255,0.1);
            --legendary: #ff00ff;
        }

        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; height: 100dvh; position: relative; background: radial-gradient(circle at top, #0a0f18 0%, #030508 100%); display: flex; flex-direction: column; }

        /* Glitch Animation */
        @keyframes glitch-shake { 0% { transform: translate(0); } 20% { transform: translate(-3px, 3px); } 40% { transform: translate(-3px, -3px); } 60% { transform: translate(3px, 3px); } 100% { transform: translate(0); } }
        .system-glitch { animation: glitch-shake 0.2s infinite; filter: hue-rotate(90deg) contrast(1.5); }

        .overlay { position: absolute; inset: 0; z-index: 5000; background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .hologram { border: 1px solid var(--accent); padding: 30px; box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); background: rgba(0, 20, 40, 0.4); }

        /* Header & Stats */
        header { padding: 50px 25px 20px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.3); }
        .hunter-name { font-family: 'JetBrains Mono'; font-size: 1.1rem; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; }
        .rank-box { font-family: 'JetBrains Mono'; font-size: 0.85rem; color: #888; font-weight: 700; }
        #job-display { font-size: 0.75rem; color: var(--accent); font-family: 'JetBrains Mono'; margin-top: 2px; }
        .lvl-text { font-size: 3.2rem; font-weight: 300; margin: 10px 0; line-height: 1; }
        .exp-bar { width: 100%; height: 2px; background: #111; margin-top: 15px; border-radius: 2px; overflow: hidden; }
        .exp-fill { height: 100%; background: var(--accent); width: 0%; transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1); box-shadow: 0 0 10px var(--accent); }

        /* Content Area */
        .content { flex: 1; overflow-y: auto; padding: 20px 25px 120px; -webkit-overflow-scrolling: touch; }
        .chart-wrap { width: 100%; max-width: 300px; margin: 0 auto 25px; }
        .quest-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; }
        .quest-card.done { border-color: var(--success); opacity: 0.4; }
        #timer { font-family: 'JetBrains Mono'; font-size: 2.2rem; text-align: center; margin-bottom: 30px; color: var(--accent); }

        /* Nav */
        nav { position: absolute; bottom: 0; width: 100%; height: 85px; background: rgba(5, 7, 10, 0.98); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 4000; }
        nav button { flex: 1; background: none; border: none; color: #444; font-family: 'JetBrains Mono'; font-size: 0.65rem; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        nav button.active { color: var(--accent); text-shadow: 0 0 8px var(--accent); }

        .btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 14px 30px; font-family: 'JetBrains Mono'; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }
        .hidden { display: none !important; }

        /* Evolution Specific UI */
        #evo-bar-container { width: 200px; height: 2px; background: #111; margin: 20px auto; position: relative; }
        #evo-bar-fill { height: 100%; width: 0%; background: var(--accent); transition: 3s linear; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="notice-overlay" class="overlay">
        <div class="hologram">
            <div style="color:var(--accent); font-family:'JetBrains Mono'; font-size:0.7rem; margin-bottom:15px;">[ NOTICE ]</div>
            <p>You have met the requirements for the <b>"Player"</b> Awakening.</p>
            <button class="btn" onclick="showAuth()">Initialize Link</button>
        </div>
    </div>

    <div id="auth-overlay" class="overlay hidden">
        <div class="hologram">
            <h2 style="font-weight: 300;">IDENTITY <br><b>SYNCHRONIZATION</b></h2>
            <button class="btn" onclick="signIn()">Sign in with Google</button>
        </div>
    </div>

    <div id="evolution-overlay" class="overlay hidden">
        <div id="evo-loading" class="hologram">
            <h2 style="letter-spacing:2px; font-weight:300;">[ SYSTEM ANALYSIS ]</h2>
            <p style="font-size:0.75rem; opacity:0.6;">Calculating player potential based on combat history...</p>
            <div id="evo-bar-container"><div id="evo-bar-fill"></div></div>
        </div>
        <div id="evo-result" class="hologram hidden">
            <p style="font-size:0.7rem; color:#888;">NEW CLASS ACQUIRED:</p>
            <h1 id="revealed-job" style="font-size:2.5rem; text-shadow:0 0 20px var(--accent); margin:10px 0;">---</h1>
            <p id="job-reward-desc" style="font-size:0.8rem; color:var(--success); margin-bottom:20px;"></p>
            <button class="btn" onclick="confirmJobChange()">Accept Evolution</button>
        </div>
    </div>

    <header id="main-header" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div style="flex: 1;">
                <span class="hunter-name" id="disp-name">PLAYER_UNKNOWN</span>
                <div id="rank-display" class="rank-box">RANK: E</div>
                <div id="job-display">UNAWAKENED</div>
                <div class="lvl-text">LVL <span id="lvl-display">01</span></div>
            </div>
            <div style="text-align: right; padding-top: 5px;">
                <div class="rank-box" style="font-size: 0.6rem; opacity: 0.6;">STREAK</div>
                <div style="font-size: 1.6rem; color: var(--accent); font-weight: 700;" id="streak-display">0</div>
            </div>
        </div>
        <div class="exp-bar"><div id="exp-fill" class="exp-fill"></div></div>
        <div id="exp-counter" style="font-family:'JetBrains Mono'; font-size:0.65rem; color:#555; text-align:right; margin-top:5px;">0 / 100 EXP</div>
    </header>

    <div id="main-content" class="content hidden"></div>

    <nav id="main-nav" class="hidden">
        <button onclick="render('status')" id="nav-status">STATUS</button>
        <button onclick="render('mission')" id="nav-mission">QUESTS</button>
        <button onclick="render('ranking')" id="nav-ranking">RANKING</button> 
        <button onclick="render('cargo')" id="nav-cargo">INVENTORY</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBBRAVqR1ZqthOmcYs9rxJULe7_w9AumJ4",
        authDomain: "levelling-faa1b.firebaseapp.com",
        projectId: "levelling-faa1b",
        storageBucket: "levelling-faa1b.firebasestorage.app",
        messagingSenderId: "586212668823",
        appId: "1:586212668823:web:12eac7b3e53e4c840e40d2"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    let p = null; 
    let statsChart = null;

    const sounds = {
        ping: new Audio('https://raw.githubusercontent.com/Aris-T004/Test-Assets/main/system-notification.mp3'), 
        levelUp: new Audio('https://raw.githubusercontent.com/Aris-T004/Test-Assets/main/level-up.mp3'),
        alert: new Audio('https://raw.githubusercontent.com/Aris-T004/Test-Assets/main/system-alert.mp3'),
        consume: new Audio('https://raw.githubusercontent.com/Aris-T004/Test-Assets/main/item-use.mp3')
    };

    function playSfx(type) { if(sounds[type]) { sounds[type].currentTime = 0; sounds[type].play().catch(() => {}); } }

    auth.onAuthStateChanged(user => { if (user) syncHunter(user); });
    async function signIn() { await auth.signInWithPopup(provider); }
    function showAuth() { document.getElementById('notice-overlay').classList.add('hidden'); document.getElementById('auth-overlay').classList.remove('hidden'); }

    async function syncHunter(user) {
        const docRef = db.collection('hunters').doc(user.uid);
        const doc = await docRef.get();
        if (doc.exists) { p = doc.data(); } 
        else {
            p = {
                name: user.displayName, level: 1, exp: 0, streak: 0, job: "UNAWAKENED",
                stats: { STR: 10, AGI: 10, VIT: 10, INT: 10, FOC: 10 },
                cargo: {}, missions: [], lastUpdate: new Date().toDateString()
            };
            await docRef.set(p);
        }
        boot();
    }

    function boot() {
        document.querySelectorAll('.overlay:not(#evolution-overlay)').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('header, nav, #main-content').forEach(el => el.classList.remove('hidden'));
        document.getElementById('disp-name').innerText = p.name.toUpperCase();
        updateUI();
        render('status');
    }

    function save() { if(auth.currentUser) db.collection('hunters').doc(auth.currentUser.uid).update(p); }

    // --- JOB EVOLUTION SYSTEM ---
    function triggerJobChange() {
        const overlay = document.getElementById('evolution-overlay');
        const bar = document.getElementById('evo-bar-fill');
        overlay.classList.remove('hidden');
        playSfx('alert');

        setTimeout(() => { bar.style.width = "100%"; }, 100);

        setTimeout(() => {
            const result = analyzeStats();
            document.getElementById('evo-loading').classList.add('hidden');
            document.getElementById('evo-result').classList.remove('hidden');
            document.getElementById('revealed-job').innerText = result.name;
            document.getElementById('job-reward-desc').innerText = `Bonus: ${result.bonus}`;
            
            if(result.name === "SHADOW MONARCH") {
                document.getElementById('revealed-job').style.color = "var(--legendary)";
                document.body.classList.add('system-glitch');
            }
            playSfx('levelUp');
        }, 3200);
    }

    function analyzeStats() {
        const s = p.stats;
        const max = Math.max(s.STR, s.AGI, s.INT, s.VIT);

        // Legendary condition: All stats high and balanced
        if(s.STR > 45 && s.AGI > 45 && s.INT > 45 && s.VIT > 45) {
            return { name: "SHADOW MONARCH", bonus: "ALL STATS +50" };
        }
        if(s.STR === max) return { name: "FIGHTER", bonus: "STR +30" };
        if(s.AGI === max) return { name: "ASSASSIN", bonus: "AGI +30" };
        if(s.INT === max) return { name: "MAGE", bonus: "INT +30" };
        return { name: "TANKER", bonus: "VIT +30" };
    }

    function confirmJobChange() {
        const job = document.getElementById('revealed-job').innerText;
        p.job = job;
        
        // Apply Bonus
        if(job === "SHADOW MONARCH") Object.keys(p.stats).forEach(k => p.stats[k] += 50);
        else if(job === "FIGHTER") p.stats.STR += 30;
        else if(job === "ASSASSIN") p.stats.AGI += 30;
        else if(job === "MAGE") p.stats.INT += 30;
        else p.stats.VIT += 30;

        document.getElementById('evolution-overlay').classList.add('hidden');
        document.body.classList.remove('system-glitch');
        save();
        updateUI();
        render('status');
    }

    function gainExp(amount) {
        p.exp += amount;
        let goal = 100 + (p.level * 5);
        while(p.exp >= goal) {
            p.exp -= goal;
            p.level++;
            goal = 100 + (p.level * 5);
            
            if(p.level === 40 && p.job === "UNAWAKENED") {
                triggerJobChange();
            } else {
                playSfx('levelUp');
            }
        }
        updateUI();
        save();
    }

    function updateUI() {
        document.getElementById('lvl-display').innerText = p.level.toString().padStart(2, '0');
        document.getElementById('job-display').innerText = p.job;
        document.getElementById('streak-display').innerText = p.streak;
        
        const goal = 100 + (p.level * 5);
        const perc = (p.exp / goal) * 100;
        document.getElementById('exp-fill').style.width = perc + "%";
        document.getElementById('exp-counter').innerText = `${p.exp} / ${goal} EXP`;
        
        // Rank logic
        let rank = "E";
        if(p.level >= 10) rank = "D";
        if(p.level >= 20) rank = "C";
        if(p.level >= 30) rank = "B";
        if(p.level >= 40) rank = "A";
        if(p.level >= 50) rank = "S";
        document.getElementById('rank-display').innerText = `RANK: ${rank}`;
    }

    // --- RENDER CONTENT ---
    function render(tab) {
        const cont = document.getElementById('main-content');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + tab).classList.add('active');

        if(tab === 'status') {
            cont.innerHTML = `<div class="chart-wrap"><canvas id="statsChart"></canvas></div>` + 
                Object.entries(p.stats).map(([k,v]) => `
                <div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #111; font-family:'JetBrains Mono';">
                    <span style="color:#777;">${k}</span>
                    <span style="color:var(--accent); font-weight:bold;">${v}</span>
                </div>`).join('');
            initChart();
        } else if(tab === 'mission') {
            // Re-use your mission generation logic here
            cont.innerHTML = `<button class="btn" onclick="gainExp(20)">Simulate Quest (+20 EXP)</button>
                             <p style="text-align:center; font-size:0.7rem; opacity:0.5; margin-top:20px;">Reach Level 40 to trigger the System Job Analysis.</p>`;
        }
        // ... inventory and ranking logic from your code goes here
    }

    function initChart() {
        const ctx = document.getElementById('statsChart').getContext('2d');
        if(statsChart) statsChart.destroy();
        statsChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['STR', 'AGI', 'VIT', 'INT', 'FOC'],
                datasets: [{
                    data: [p.stats.STR, p.stats.AGI, p.stats.VIT, p.stats.INT, p.stats.FOC],
                    backgroundColor: 'rgba(0, 212, 255, 0.1)',
                    borderColor: '#00d4ff',
                    borderWidth: 2,
                    pointRadius: 0
                }]
            },
            options: {
                scales: { r: { grid: { color: 'rgba(255,255,255,0.05)' }, angleLines: { display: false }, ticks: { display: false }, suggestedMin: 0 } }
            }
        });
    }

</script>
</body>
</html>
